<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Inspect</title>
  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <!--SEARCH ENGINE-->
  <nav>


    <section id="search">
      <input type="text" id="searchInput" placeholder="Search for a movie...">
      <button class="searchButton" onclick="handleSearch()">Search</button>
    </section>


    <section id="library">
      <div class="library-trigger">
        <h2>My Library</h2>
      </div>
      <div class="dropdown-menu">
        <a href="#" id="watchLater">
          <h3>Watch Later</h3>
        </a>
        <a href="#" id="watched">
          <h3>Watched</h3>
        </a>
        <a href="#" id="favorites">
          <h3>Favorites</h3>
        </a>
      </div>
    </section>
  </nav>

  <div class = "shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
  </div>

  <header>
    <h1>Inspect<span> any movie or show of your choice</span></h1>
  </header>

  <!--  RESULTS SECTION -->

  <div>
    <section class="divider">
      <h2>Results</h2>
      <div id="results" class="grid">
        <p>Search for a movie or show to see results here.</p>
      
      </div>
      
  </div>

<!--  modal for show/movie details -->
  <div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <div id="modalDetails"></div>
  </div>
</div>

</body>
<script src="app.js"></script>

</html>
