<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Finder App</title>
  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <header>
    <h1>🎬 Media Finder</h1>
    <p>Search for movies and save them to your library</p>
  </header>


<!--SEARCH ENGINE-->

  <section id="search-section">
    <input 
      type="text" 
      id="searchInput" 
      placeholder="Search for a movie..."
    >
    <button onclick="handleSearch()">Search</button>
  </section>


 
  <!--  RESULTS SECTION -->

  <section>
    <h2>Results</h2>
    <div id="results" class="grid"></div>
  </section>


  <!-- DETAILS SECTION -->
  
  <section>
    <h2>Details</h2>
    <div id="details"></div>
  </section>


  <!-- LIBRARY SECTION -->

  <section>
    <h2>My Library</h2>

    <h3>Watch Later</h3>
    <div id="watchLater"></div>

    <h3>Watched</h3>
    <div id="watched"></div>
  </section>





</body>
<script src="app.js"></script>
</html>
