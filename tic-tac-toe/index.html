<html>
<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tic Tac Toe</title>
	<link rel="stylesheet" href="styles.css" media="all">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=diamond" />
    
    <script src="scripts.js" defer=""></script>
    </head>
<body>
    <div class = "container">
    <div id="currentPlayer">
        Current Player: &nbsp;<span></span>
    </div>
    <div id="gameResult">
        <span>(no winner yet)</span><br>
        <button id="refreshButton">Play Again</button>
    </div>
        <section class ="gameBoard">

            <div class="box" id = "a1"></div>
            <div class="box" id = "a2"></div>
            <div class="box" id = "a3"></div>
            <div class="box" id = "b1"></div>
            <div class="box" id = "b2"></div>
            <div class="box" id = "b3"></div>
            <div class="box" id = "c1"></div>
            <div class="box" id = "c2"></div>
            <div class="box" id = "c3"></div>
        </section>
    </div>    
</body>
</html>
